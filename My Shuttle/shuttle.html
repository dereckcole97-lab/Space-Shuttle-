<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shuttle Mission Control</title>
    <style>
        /* --- CSS VARIABLES: Easy global styling tweaks --- */
        :root {
            --sky-color: #050b18;
            --platform-color: #333;
            --shuttle-body: #eee;
            --accent-orange: #ff6600;
            --text-glow: #00f2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--sky-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Prevents scrollbars during launch */
            color: white;
        }

        /* --- THE ENVIRONMENT --- */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            z-index: 0;
        }

        .launch-pad {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: var(--platform-color);
            border-top: 5px solid #555;
            z-index: 2;
        }

        /* --- THE SHUTTLE ASSEMBLY --- */
        .shuttle-container {
            position: absolute;
            bottom: 100px; /* Sits on the launch pad */
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 120px;
            transition: bottom 5s cubic-bezier(.65, .05, .36, 1); /* Smooth takeoff curve */
            z-index: 3;
        }

        /* Basic Shuttle Shape */
        .shuttle-body {
            width: 40px;
            height: 80px;
            background: var(--shuttle-body);
            margin: 0 auto;
            border-radius: 50% 50% 10% 10% / 80% 80% 10% 10%;
            position: relative;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }

        /* Wings */
        .wing {
            position: absolute;
            bottom: 10px;
            width: 0;
            height: 0;
            border-style: solid;
        }
        .wing-left {
            left: -20px;
            border-width: 0 20px 40px 0;
            border-color: transparent var(--shuttle-body) transparent transparent;
        }
        .wing-right {
            right: -20px;
            border-width: 0 0 40px 20px;
            border-color: transparent transparent transparent var(--shuttle-body);
        }

        /* Exhaust/Fire Container */
        .exhaust {
            width: 20px;
            height: 0;
            background: linear-gradient(to bottom, orange, transparent);
            margin: 0 auto;
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* Active Launch State for Fire */
        .launching .exhaust {
            height: 100px;
            opacity: 1;
            background: orange;
            filter: blur(5px);
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            from { transform: scaleX(1); opacity: 0.8; }
            to { transform: scaleX(1.2); opacity: 1; }
        }

        /* --- UI / OVERLAY --- */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 2px solid var(--text-glow);
            border-radius: 8px;
            box-shadow: 0 0 15px var(--text-glow);
        }

        #countdown {
            font-size: 3rem;
            color: var(--text-glow);
            margin-bottom: 15px;
            text-align: center;
        }

        button {
            background: transparent;
            color: var(--text-glow);
            border: 1px solid var(--text-glow);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            background: var(--text-glow);
            color: black;
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="ui-panel">
        <div id="status">SYSTEMS: READY</div>
        <div id="countdown">10</div>
        <button id="launchBtn">INITIATE LAUNCH</button>
    </div>

    <div class="shuttle-container" id="shuttle">
        <div class="shuttle-body">
            <div class="wing wing-left"></div>
            <div class="wing wing-right"></div>
        </div>
        <div class="exhaust"></div>
    </div>

    <div class="launch-pad"></div>

    <script>
        // --- SELECTING ELEMENTS ---
        const launchBtn = document.getElementById('launchBtn');
        const countdownEl = document.getElementById('countdown');
        const shuttle = document.getElementById('shuttle');
        const statusEl = document.getElementById('status');

        let count = 10;
        let timer = null;

        /**
         * The main launch sequence function.
         * Handles the countdown logic and triggers CSS animations.
         */
        function startSequence() {
            // Disable button to prevent multiple clicks
            launchBtn.disabled = true;
            statusEl.innerText = "STATUS: COUNTDOWN ACTIVE";
            
            timer = setInterval(() => {
                count--;
                countdownEl.innerText = count;

                // T-Minus 3: Start the engines (visual effect)
                if (count === 3) {
                    shuttle.classList.add('launching');
                    statusEl.innerText = "STATUS: ENGINE IGNITION";
                }

                // Liftoff!
                if (count <= 0) {
                    clearInterval(timer);
                    liftOff();
                }
            }, 1000);
        }

        /**
         * Triggers the physical movement of the shuttle.
         */
        function liftOff() {
            countdownEl.innerText = "LIFT OFF!";
            statusEl.innerText = "STATUS: ASCENT PHASE";
            
            // Move the shuttle up 150% of the screen height
            shuttle.style.bottom = "150%";

            // Reset after flight is done (optional)
            setTimeout(() => {
                statusEl.innerText = "STATUS: ORBIT REACHED";
            }, 5000);
        }

        // --- EVENT LISTENERS ---
        launchBtn.addEventListener('click', startSequence);

    </script>
</body>
</html>
